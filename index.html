<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Hallo Vegvisr</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://favicons.vegvisr.org/favicons/1773237743072-1-1773237750881-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://favicons.vegvisr.org/favicons/1773237743072-1-1773237750881-180x180.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://favicons.vegvisr.org/favicons/1773237743072-1-1773237750881-512x512.png">
    <script>
      // Theme boot — runs BEFORE React mounts so there's no flash of the
      // wrong theme. Reads localStorage.theme ('light' | 'dark' | 'system').
      // If unset, defaults to 'dark' to preserve the experience existing users
      // already have; new users can switch in Settings. 'system' follows the
      // OS preference. Mirrored in src/services/theme-service.ts.
      (function() {
        try {
          var pref = localStorage.getItem('theme') || 'dark';
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : pref;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {
          // localStorage may be unavailable (private mode). Default to dark.
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
